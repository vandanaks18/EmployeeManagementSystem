<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EMS — Employee Management System</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">⬡ EMS</div>
    <nav>
      <span class="nav-pill active" onclick="showSection('dashboard')">Dashboard</span>
      <span class="nav-pill" onclick="showSection('employees')">Employees</span>
      <span class="nav-pill" onclick="showSection('add')">+ Add New</span>
    </nav>
  </header>

  <!-- DASHBOARD -->
  <section id="dashboard" class="section active">
    <div class="hero">
      <h1>Employee<br/><span class="accent">Management</span><br/>System</h1>
      <p class="subtitle">Built with Spring Boot · MySQL · REST API</p>
    </div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="totalCount">—</div>
        <div class="stat-label">Total Employees</div>
      </div>
      <div class="stat-card highlight">
        <div class="stat-num">CRUD</div>
        <div class="stat-label">Full Operations</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">REST</div>
        <div class="stat-label">API Powered</div>
      </div>
    </div>
    <button class="btn-primary" onclick="showSection('employees')">View All Employees →</button>
  </section>

  <!-- EMPLOYEES LIST -->
  <section id="employees" class="section">
    <div class="section-header">
      <h2>All Employees</h2>
      <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Search name, dept, email…" oninput="handleSearch(this.value)"/>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Department</th>
            <th>Designation</th>
            <th>Salary (₹)</th>
            <th>Phone</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="empTableBody">
          <tr><td colspan="8" class="loading">Loading employees…</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <!-- ADD / EDIT FORM -->
  <section id="add" class="section">
    <div class="form-card">
      <h2 id="formTitle">Add New Employee</h2>
      <input type="hidden" id="empId"/>

      <div class="form-grid">
        <div class="field">
          <label>First Name</label>
          <input type="text" id="firstName" placeholder="Rahul"/>
        </div>
        <div class="field">
          <label>Last Name</label>
          <input type="text" id="lastName" placeholder="Kumar"/>
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="email" placeholder="rahul@example.com"/>
        </div>
        <div class="field">
          <label>Phone</label>
          <input type="text" id="phone" placeholder="+91 9876543210"/>
        </div>
        <div class="field">
          <label>Department</label>
          <select id="department">
            <option value="">Select Department</option>
            <option>Engineering</option>
            <option>Human Resources</option>
            <option>Finance</option>
            <option>Marketing</option>
            <option>Operations</option>
            <option>Sales</option>
          </select>
        </div>
        <div class="field">
          <label>Designation</label>
          <input type="text" id="designation" placeholder="Software Engineer"/>
        </div>
        <div class="field full">
          <label>Salary (₹)</label>
          <input type="number" id="salary" placeholder="500000"/>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn-primary" onclick="submitForm()">Save Employee</button>
        <button class="btn-ghost" onclick="resetForm()">Cancel</button>
      </div>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
